version: "3.8"

services:
  app:
    build: .
    container_name: fastapi_app
    restart: always
    env_file: .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:latest
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    container_name: celery_worker
    restart: always
    env_file: .env
    depends_on:
      - redis
      - db
    command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=info"]

  alembic:
    build: .
    container_name: alembic_migrations
    depends_on:
      - db
    env_file: .env
    command: ["alembic", "upgrade", "head"]

volumes:
  postgres_data:
